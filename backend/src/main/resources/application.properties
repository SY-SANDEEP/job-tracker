spring.application.name=job-tracker

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/jobtracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sy}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:myjobtrackersecretkey2024supersecure123456}
jwt.expiration=${JWT_EXPIRATION:86400000}

gemini.api.key=${GEMINI_API_KEY:}

server.port=${PORT:8080}